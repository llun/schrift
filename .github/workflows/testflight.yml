name: TestFlight

# Every merge to `main` ships a build to TestFlight, fully automatically:
#
#   1. compute the next Conventional-Commits version from the latest `v*` tag
#      (scripts/next-version.sh) — feat: -> minor, feat!/BREAKING -> major,
#      anything else -> patch, so every merge bumps at least a patch;
#   2. build a signed Release archive and upload it to TestFlight, using the
#      computed marketing version and the run number as the (monotonic) build
#      number;
#   3. on a successful upload, tag the commit `v<version>` and cut a GitHub
#      Release with auto-generated notes.
#
# The tag is an OUTPUT of this pipeline, not a trigger for it: the tag push
# uses the default GITHUB_TOKEN, and pushes made with that token do not start
# new workflow runs — so there is no release loop. Nothing is committed back to
# `main` (the version is derived from tags), so the push trigger can't loop
# either. You can still ship manually from the Actions tab (workflow_dispatch);
# add `[skip ci]` to a commit message to skip a build.
#
# NOTE: never add a `pull_request` / `pull_request_target` trigger here — it
# would expose the signing secrets below to fork PRs.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize releases so two quick merges don't race on the tag or build number.
concurrency:
  group: testflight-release
  cancel-in-progress: false

# Required to push the version tag and create the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    name: Build & upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      # --- App Store Connect API key (auth + signing + upload) ---
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}   # base64 of the .p8 file
      # --- Signing (fastlane match) ---
      DEVELOPER_TEAM_ID: ${{ secrets.DEVELOPER_TEAM_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      # --- Build metadata ---
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v7
        with:
          # Need full history + tags so scripts/next-version.sh can find the
          # latest v* tag and the commits since it.
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          version="$(bash scripts/next-version.sh)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Next release version: $version (build ${BUILD_NUMBER})"

      # Match the Xcode version to what you build with locally.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - uses: ruby/setup-ruby@v1
        with:
          # Ruby version is read from .ruby-version (kept in sync with local dev)
          bundler-cache: true

      - name: Set up SSH access to the certificates repo
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$MATCH_SSH_PRIVATE_KEY" > ~/.ssh/match_ed25519
          chmod 600 ~/.ssh/match_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
        env:
          MATCH_SSH_PRIVATE_KEY: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Build & upload
        run: bundle exec fastlane beta
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_ed25519 -o IdentitiesOnly=yes"
          MARKETING_VERSION: ${{ steps.version.outputs.version }}

      # The tag + release steps only run if the build & upload above succeeded,
      # so a failed build never burns a version number.
      - name: Tag the release
        run: |
          tag="v${{ steps.version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "v${version}" \
            --title "v${version}" \
            --generate-notes \
            --target "${{ github.sha }}"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            *.ipa
            fastlane/report.xml
            ~/Library/Logs/gym/*.log
          if-no-files-found: ignore
          retention-days: 7
