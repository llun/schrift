name: Schrift
options:
  bundleIdPrefix: dev.llun
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Schrift:
    type: application
    platform: iOS
    sources:
      - path: Schrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.llun.Schrift
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Schrift
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # App uses only standard HTTPS/TLS (exempt encryption), so no export
        # compliance docs are needed. Setting this avoids the manual prompt on
        # every TestFlight upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
    scheme:
      testTargets:
        - SchriftTests
      gatherCoverageData: true
  SchriftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SchriftTests
    dependencies:
      - target: Schrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.llun.Schrift.Tests
        GENERATE_INFOPLIST_FILE: true
