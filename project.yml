name: Schrift
options:
  bundleIdPrefix: dev.llun
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Schrift:
    type: application
    platform: iOS
    # Local dev signing: pulls in a git-ignored Local.xcconfig (via
    # Signing.xcconfig's optional include) so a Team ID is never committed.
    # CI overrides this with match — see fastlane/Fastfile.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Schrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.llun.Schrift
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Schrift
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # App uses only standard HTTPS/TLS (exempt encryption), so no export
        # compliance docs are needed. Setting this avoids the manual prompt on
        # every TestFlight upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # iPad (device family 2) must declare all four orientations for
        # multitasking, or App Store upload validation rejects the build.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    scheme:
      testTargets:
        - SchriftTests
      gatherCoverageData: true
  SchriftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SchriftTests
    dependencies:
      - target: Schrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.llun.Schrift.Tests
        GENERATE_INFOPLIST_FILE: true
