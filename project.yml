name: Schrift
options:
  bundleIdPrefix: dev.llun
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Schrift:
    type: application
    platform: iOS
    # Local dev signing: pulls in a git-ignored Local.xcconfig (via
    # Signing.xcconfig's optional include) so a Team ID is never committed.
    # CI overrides this with match — see fastlane/Fastfile.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Schrift
    # Advertises the in-code-localized languages (Core/Localization) to the OS —
    # there are no per-language .lproj resource bundles, so Xcode can't infer this
    # from disk the way it does for string-table localizations, and there is no
    # INFOPLIST_KEY_CFBundleLocalizations synthesis (verified: Xcode's Info.plist
    # generation silently drops that key — CFBundleLocalizations is apparently not
    # on its curated list of build-setting-synthesizable keys, unlike scalar/flag
    # keys such as INFOPLIST_KEY_UISupportedInterfaceOrientations_* below). The only
    # way to emit it is a template merged in via INFOPLIST_FILE +
    # GENERATE_INFOPLIST_FILE: true (Xcode overlays the INFOPLIST_KEY_* synthesized
    # keys onto this template rather than replacing it). XcodeGen writes that
    # template to `info.path` below — like the .xcodeproj itself, this file is
    # entirely reproduced from this spec by `xcodegen generate` and is git-ignored;
    # never hand-edit or commit it.
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - fr
          - es
          - de
          - it
          - nl
          - pt
          - sl
          - th
          - zh-Hans
          - zh-Hant
        # The app's icon set is Google Material Symbols Outlined (the exact glyphs
        # the design handoff specifies), bundled as a 17KB subset of just the ~69
        # glyphs used, with only the FILL axis kept (0 = outlined, 1 = filled for
        # active/selected states). Registered here by filename (iOS resolves it in
        # the bundle regardless of the Resources/Fonts/ subfolder). Like
        # CFBundleLocalizations, UIAppFonts is an array Xcode's Info.plist
        # synthesis can't take via INFOPLIST_KEY_*, so it lives in this template.
        # Rendered by DesignSystem/Tokens/MaterialIcon.swift. Apache-2.0
        # (Resources/Fonts/MaterialSymbols-LICENSE.txt).
        UIAppFonts:
          - MaterialSymbolsOutlined-Icons.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.llun.Schrift
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Schrift
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # App uses only standard HTTPS/TLS (exempt encryption), so no export
        # compliance docs are needed. Setting this avoids the manual prompt on
        # every TestFlight upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # iPad (device family 2) must declare all four orientations for
        # multitasking, or App Store upload validation rejects the build.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    scheme:
      testTargets:
        - SchriftTests
      gatherCoverageData: true
  SchriftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SchriftTests
    dependencies:
      - target: Schrift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.llun.Schrift.Tests
        GENERATE_INFOPLIST_FILE: true
